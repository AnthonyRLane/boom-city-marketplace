	// ═══ FAVORITES (localStorage) ═══
	var STORAGE_KEY = 'boomcity_favorites';

	function getFavorites() {
		try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
		catch(e) { return []; }
	}

	function saveFavorites(ids) {
		localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
	}

	function removeFavorite(id) {
		var favs = getFavorites().filter(function(f) { return f !== id; });
		saveFavorites(favs);
		// Animate out
		var card = document.querySelector('[data-stand-id="' + id + '"]');
		if (card) {
			card.classList.add('removing');
			setTimeout(function() { renderFavorites(); }, 300);
		} else {
			renderFavorites();
		}
	}

	// ═══ HELPERS ═══
	function getStatus(s) {
		var now = new Date();
		var cur = now.getHours() * 60 + now.getMinutes();
		var op = parseInt(s.open.split(':')[0]) * 60 + parseInt(s.open.split(':')[1]);
		var cl = parseInt(s.close.split(':')[0]) * 60 + parseInt(s.close.split(':')[1]);
		if (cl <= op) return cur >= op || cur < cl;
		return cur >= op && cur < cl;
	}

	function formatTime(t) {
		var p = t.split(':');
		var h = parseInt(p[0]); var m = parseInt(p[1] || 0);
		if (h === 0 && m === 0) return 'Midnight';
		if (h === 12 && m === 0) return 'Noon';
		var suf = h >= 12 ? 'PM' : 'AM';
		var hr = h % 12 || 12;
		return m > 0 ? hr + ':' + String(m).padStart(2, '0') + suf : hr + suf;
	}

	function catLabel(cat) {
		return cat === 'fireworks' ? 'Fireworks' : cat === 'food' ? 'Food' : 'Crafts';
	}

	// ═══ RENDER ═══
	function renderFavorites() {
		var favIds = getFavorites();
		var favStands = [];

		// Preserve order they were favorited
		favIds.forEach(function(id) {
			var s = allStands.find(function(st) { return st.id === id; });
			if (s) favStands.push(s);
		});

		// Update counter
		document.getElementById('favCount').textContent = favStands.length > 0
			? favStands.length + ' saved' : '';

		var list = document.getElementById('favList');
		var empty = document.getElementById('emptyState');

		if (favStands.length === 0) {
			list.innerHTML = '';
			empty.style.display = 'block';
			return;
		}
		empty.style.display = 'none';

		var html = '';
		favStands.forEach(function(s, i) {
			var isOpen = getStatus(s);
			var sc = isOpen ? 'open' : 'closed';
			var st = isOpen ? 'Open Now' : 'Closed';
			var hours = formatTime(s.open) + ' – ' + formatTime(s.close);
			var delay = Math.min(i * 40, 300);

			html += '<div class="fav-card" data-stand-id="' + s.id + '" style="animation-delay:' + delay + 'ms">' +
				'<button class="fav-remove" onclick="event.stopPropagation(); removeFavorite(\'' + s.id + '\')" title="Remove from favorites">✕</button>' +
				'<a href="' + s.link + '" style="display:flex;gap:16px;text-decoration:none;color:#fff;flex:1;min-width:0;">' +
					'<img class="fav-card-photo" src="' + s.photo + '" alt="' + s.name + '" loading="lazy" />' +
					'<div class="fav-card-body">' +
						'<div class="fav-card-top">' +
							'<span class="fav-card-name">' + s.name + '</span>' +
							'<span class="fav-card-tag ' + s.cat + '">' + catLabel(s.cat) + '</span>' +
						'</div>' +
						'<div class="fav-card-meta">' + s.owner + ' · Stand #' + s.num + ' · Est. ' + s.since + '</div>' +
						'<div class="fav-card-details">' +
							'<span class="fav-card-status ' + sc + '">' +
								'<span class="fav-card-status-dot ' + sc + '"></span> ' + st +
							'</span>' +
							'<span class="fav-card-detail">' +
								'<i class="ki-duotone ki-time"><span class="path1"></span><span class="path2"></span></i> ' + hours +
							'</span>' +
							'<span class="fav-card-detail">' +
								'<i class="ki-duotone ki-geolocation"><span class="path1"></span><span class="path2"></span></i> Zone ' + s.zone + ', Row ' + s.row +
							'</span>' +
						'</div>' +
						'<div class="fav-card-payment">💳 ' + s.payment + '</div>' +
					'</div>' +
				'</a>' +
			'</div>';
		});

		list.innerHTML = html;
	}

	// ═══ SEED DEMO FAVORITES ═══
	// If first visit, seed a few favorites to show the UI
	if (!localStorage.getItem(STORAGE_KEY)) {
		saveFavorites(['big-chief', 'aunties-frybread', 'spirit-bear', 'sky-king', 'smokeys-bbq']);
	}

	renderFavorites();
	</script>
</body>
</html>
