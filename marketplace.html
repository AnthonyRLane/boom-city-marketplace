			background: #070B1A !important; color: #fff;
			-webkit-font-smoothing: antialiased;
			padding-bottom: 80px;
		}
		body *, .page, .wrapper, .content {
			background-color: transparent !important;
		}
		body { background: #070B1A !important; }

		/* ═══ Top Bar ═══ */
		.mp-topbar {
			position: sticky; top: 0; z-index: 100;
			background: rgba(7,11,26,0.92);
			-webkit-backdrop-filter: saturate(180%) blur(20px);
			backdrop-filter: saturate(180%) blur(20px);
			border-bottom: 1px solid rgba(255,255,255,0.06);
			padding: 12px 16px;
			padding-top: calc(12px + env(safe-area-inset-top, 0px));
		}
		.mp-topbar-inner {
			max-width: 680px; margin: 0 auto;
		}
		.mp-topbar-header {
			display: flex; align-items: center; justify-content: space-between;
			margin-bottom: 12px;
		}
		.mp-topbar-logo {
			display: flex; align-items: center; gap: 8px;
			text-decoration: none; color: #fff;
			font-size: 15px; font-weight: 800;
		}
		.mp-topbar-logo img { height: 28px; }
		.mp-topbar-badge {
			font-size: 10px; font-weight: 700; text-transform: uppercase;
			letter-spacing: 1px; color: #F59E0B;
		}

		/* ═══ Search ═══ */
		.mp-search {
			position: relative;
		}
		.mp-search-icon {
			position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
			color: rgba(255,255,255,0.3); font-size: 16px; pointer-events: none;
		}
		.mp-search-input {
			width: 100%;
			background: rgba(255,255,255,0.06);
			border: 1px solid rgba(255,255,255,0.08);
			border-radius: 12px;
			padding: 12px 14px 12px 42px;
			color: #fff; font-size: 15px; font-family: 'Inter', sans-serif;
			outline: none;
			transition: border-color 0.2s, background 0.2s;
		}
		.mp-search-input:focus {
			border-color: rgba(255,255,255,0.2);
			background: rgba(255,255,255,0.08);
		}
		.mp-search-input::placeholder { color: rgba(255,255,255,0.3); }
		.mp-search-clear {
			position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
			background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
			width: 24px; height: 24px; color: rgba(255,255,255,0.5);
			font-size: 14px; cursor: pointer; display: none;
			align-items: center; justify-content: center;
		}
		.mp-search-clear.visible { display: flex; }

		/* ═══ Filters ═══ */
		.mp-filters {
			display: flex; gap: 8px;
			padding: 12px 16px 0;
			max-width: 680px; margin: 0 auto;
			overflow-x: auto;
			-webkit-overflow-scrolling: touch;
			scrollbar-width: none;
		}
		.mp-filters::-webkit-scrollbar { display: none; }
		.mp-filter {
			display: flex; align-items: center; gap: 6px;
			padding: 8px 16px;
			border-radius: 50px;
			font-size: 13px; font-weight: 600;
			white-space: nowrap; cursor: pointer;
			border: 1px solid rgba(255,255,255,0.08);
			background: rgba(255,255,255,0.04);
			color: rgba(255,255,255,0.5);
			transition: all 0.2s;
			-webkit-tap-highlight-color: transparent;
		}
		.mp-filter:hover {
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.7);
		}
		.mp-filter.active {
			background: rgba(245,158,11,0.12);
			border-color: rgba(245,158,11,0.25);
			color: #F59E0B;
		}
		.mp-filter-count {
			font-size: 11px; font-weight: 700;
			background: rgba(255,255,255,0.08);
			padding: 1px 6px; border-radius: 10px;
			color: rgba(255,255,255,0.35);
		}
		.mp-filter.active .mp-filter-count {
			background: rgba(245,158,11,0.2);
			color: #F59E0B;
		}

		/* ═══ Results info ═══ */
		.mp-results-info {
			max-width: 680px; margin: 0 auto;
			padding: 16px 16px 8px;
			display: flex; align-items: center; justify-content: space-between;
		}
		.mp-results-count {
			font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 500;
		}
		.mp-results-count strong { color: rgba(255,255,255,0.6); font-weight: 700; }
		.mp-sort {

			background: none; border: none; cursor: pointer;
			display: flex; align-items: center; gap: 4px;
			font-family: 'Inter', sans-serif; font-weight: 600;
		}
		.mp-sort:hover { color: rgba(255,255,255,0.6); }

		/* ═══ Stand List ═══ */
		.mp-list {
			max-width: 680px; margin: 0 auto;
			padding: 0 16px;
			display: flex; flex-direction: column; gap: 8px;
		}

		/* ═══ Stand Card ═══ */
		.mp-card {
			display: flex; align-items: center; gap: 14px;
			padding: 14px;
			background: rgba(255,255,255,0.03);
			border: 1px solid rgba(255,255,255,0.06);
			border-radius: 14px;
			text-decoration: none; color: #fff;
			transition: background 0.15s, border-color 0.15s, transform 0.15s;
			-webkit-tap-highlight-color: transparent;
		}
		.mp-card:hover {
			background: rgba(255,255,255,0.06);
			border-color: rgba(255,255,255,0.12);
		}
		.mp-card:active { transform: scale(0.985); }

		.mp-card-photo {
			width: 56px; height: 56px; border-radius: 14px;
			object-fit: cover; flex-shrink: 0;
			background: rgba(255,255,255,0.05);
		}
		.mp-card-body { flex: 1; min-width: 0; }
		.mp-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
		.mp-card-name {
			font-size: 15px; font-weight: 700;
			white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
		}
		.mp-card-tag {
			flex-shrink: 0;
			font-size: 10px; font-weight: 700; text-transform: uppercase;
			letter-spacing: 0.5px;
			padding: 2px 7px; border-radius: 6px;
		}

			background: rgba(245,158,11,0.12); color: #F59E0B;
		}
		.mp-card-tag.food {
			background: rgba(52,211,153,0.12); color: #34D399;
		}
		.mp-card-tag.crafts {
			background: rgba(139,92,246,0.12); color: #A78BFA;
		}
		.mp-card-meta {
			font-size: 12px; color: rgba(255,255,255,0.35);
			white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
		}
		.mp-card-bottom {
			display: flex; align-items: center; gap: 10px; margin-top: 4px;
		}
		.mp-card-status {
			display: flex; align-items: center; gap: 4px;
			font-size: 11px; font-weight: 600;
		}
		.mp-card-status-dot {
			width: 6px; height: 6px; border-radius: 50%;
		}
		.mp-card-status-dot.open { background: #34D399; box-shadow: 0 0 6px rgba(52,211,153,0.5); }
		.mp-card-status-dot.closed { background: #EF4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); }
		.mp-card-status.open { color: #34D399; }
		.mp-card-status.closed { color: #EF4444; }
		.mp-card-detail {
			font-size: 11px; color: rgba(255,255,255,0.25);
		}
		.mp-card-arrow {
			flex-shrink: 0;
			color: rgba(255,255,255,0.15);
			font-size: 18px;
			margin-left: auto;
		}

		}

		.mp-empty-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: rgba(255,255,255,0.5); }
		.mp-empty-sub { font-size: 13px; }

			border-top: 1px solid rgba(255, 255, 255, 0.06);
			box-shadow: 0 -1px 12px rgba(0, 0, 0, 0.04);
		}
		.stand-nav-item {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 3px;
			padding: 6px 0;
			cursor: pointer;
			-webkit-tap-highlight-color: transparent;
			transition: color 0.2s ease, transform 0.15s ease;
			color: rgba(255,255,255,0.35);
			text-decoration: none !important;
			position: relative;
		}
		.stand-nav-item:active { transform: scale(0.92); }
		.stand-nav-item.active { color: #F59E0B; }
		.stand-nav-item.active::before {
			content: '';
			position: absolute;
			top: 0; left: 25%; right: 25%;
			height: 2px;
			background: #F59E0B;
			border-radius: 0 0 2px 2px;
		}
		.stand-nav-item.active .stand-nav-icon {
			filter: drop-shadow(0 0 6px rgba(245,158,11,0.4));
		}
		.stand-nav-icon { font-size: 20px; line-height: 1; }
		.stand-nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

		/* ═══ Animations ═══ */
		@keyframes fadeUp {
			from { opacity: 0; transform: translateY(8px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.mp-card { animation: fadeUp 0.3s ease both; }
	</style>
</head>

		{ name: "Spirit Bear Jewelry", num: 202, zone: "G", row: 1, cat: "crafts", owner: "Tina Bear", since: 2014, open: "09:00", close: "20:00", payment: "Cash, Card, Venmo", photo: "assets/media/avatars/300-19.jpg", link: "#" },
		{ name: "Dreamcatcher Designs", num: 203, zone: "G", row: 2, cat: "crafts", owner: "Rachel Whitefeather", since: 2017, open: "10:00", close: "19:00", payment: "Cash, Card", photo: "assets/media/avatars/300-22.jpg", link: "#" },
		{ name: "Totem Arts", num: 204, zone: "G", row: 2, cat: "crafts", owner: "Paul Carver", since: 2008, open: "09:00", close: "20:00", payment: "Cash", photo: "assets/media/avatars/300-27.jpg", link: "#" },
		{ name: "Coastal Creations", num: 205, zone: "G", row: 3, cat: "crafts", owner: "Michelle Adams", since: 2021, open: "10:00", close: "19:00", payment: "Cash, Card, Venmo", photo: "assets/media/avatars/300-28.jpg", link: "#" },
	];

	// ═══ STATE ═══
	var currentFilter = 'all';
	var currentSort = 'az';
	var searchTerm = '';

	// ═══ INIT ═══
	updateCounts();
	renderList();

	// ═══ SEARCH ═══
	var searchInput = document.getElementById('searchInput');
	var searchClear = document.getElementById('searchClear');
	var searchTimer;

	searchInput.addEventListener('input', function() {
		clearTimeout(searchTimer);
		var val = this.value;
		searchClear.classList.toggle('visible', val.length > 0);
		searchTimer = setTimeout(function() {
			searchTerm = val.toLowerCase().trim();
			renderList();
		}, 150);
	});

	function clearSearch() {
		searchInput.value = '';
		searchClear.classList.remove('visible');
		searchTerm = '';
		renderList();
		searchInput.focus();
	}

	// ═══ FILTER ═══
	function filterBy(cat, el) {
		currentFilter = cat;
		document.querySelectorAll('.mp-filter').forEach(function(f) { f.classList.remove('active'); });
		el.classList.add('active');
		renderList();
	}

	// ═══ SORT ═══
	function toggleSort() {
		if (currentSort === 'az') { currentSort = 'num'; document.getElementById('sortLabel').textContent = 'Stand #'; }
		else if (currentSort === 'num') { currentSort = 'zone'; document.getElementById('sortLabel').textContent = 'Zone'; }
		else { currentSort = 'az'; document.getElementById('sortLabel').textContent = 'A–Z'; }
		renderList();
	}

	// ═══ COUNTS ═══
	function updateCounts() {
		document.getElementById('countAll').textContent = stands.length;
		document.getElementById('countFireworks').textContent = stands.filter(function(s) { return s.cat === 'fireworks'; }).length;
		document.getElementById('countFood').textContent = stands.filter(function(s) { return s.cat === 'food'; }).length;
		document.getElementById('countCrafts').textContent = stands.filter(function(s) { return s.cat === 'crafts'; }).length;
	}

	// ═══ STATUS ═══
	function getStatus(s) {
		var now = new Date();
		var cur = now.getHours() * 60 + now.getMinutes();
		var op = parseInt(s.open.split(':')[0]) * 60 + parseInt(s.open.split(':')[1]);
		var cl = parseInt(s.close.split(':')[0]) * 60 + parseInt(s.close.split(':')[1]);
		if (cl <= op) return cur >= op || cur < cl;
		return cur >= op && cur < cl;
	}

	function formatTime(t) {
		var p = t.split(':');
		var h = parseInt(p[0]); var m = parseInt(p[1] || 0);
		if (h === 0 && m === 0) return 'Midnight';
		if (h === 12 && m === 0) return 'Noon';
		var suf = h >= 12 ? 'PM' : 'AM';
		var hr = h % 12 || 12;
		return m > 0 ? hr + ':' + String(m).padStart(2, '0') + suf : hr + suf;
	}

	// ═══ RENDER ═══
	function renderList() {
		var filtered = stands.filter(function(s) {
			if (currentFilter !== 'all' && s.cat !== currentFilter) return false;
			if (searchTerm) {
				var hay = (s.name + ' ' + s.owner + ' ' + s.cat + ' stand ' + s.num + ' zone ' + s.zone).toLowerCase();
				return hay.indexOf(searchTerm) !== -1;
			}
			return true;
		});

		// Sort
		filtered.sort(function(a, b) {
			if (currentSort === 'az') return a.name.localeCompare(b.name);
			if (currentSort === 'num') return a.num - b.num;
			if (currentSort === 'zone') {
				if (a.zone !== b.zone) return a.zone.localeCompare(b.zone);
				return a.row - b.row;
			}
		});

		// Results count
		var label = currentFilter === 'all' ? 'stands' :
			currentFilter === 'fireworks' ? 'fireworks stands' :
			currentFilter === 'food' ? 'food vendors' : 'craft vendors';
		document.getElementById('resultsCount').innerHTML = '<strong>' + filtered.length + '</strong> ' + label +
			(searchTerm ? ' matching "' + searchTerm + '"' : '');

		// Empty state
		var list = document.getElementById('standList');
		var empty = document.getElementById('emptyState');
		if (filtered.length === 0) {
			list.innerHTML = '';
			empty.style.display = 'block';
			return;
		}
		empty.style.display = 'none';

		// Build cards
		var html = '';
		var lastCat = '';
		filtered.forEach(function(s, i) {
			// Category divider when showing all and sorted by name
			if (currentFilter === 'all' && currentSort === 'az') {
				var catLabel = s.cat === 'fireworks' ? '🎆 Fireworks' : s.cat === 'food' ? '🍔 Food & Concession' : '🎨 Crafts';
				if (s.cat !== lastCat) {
					html += '<div class="mp-divider"><span class="mp-divider-text">' + catLabel + '</span><span class="mp-divider-line"></span></div>';
					lastCat = s.cat;
				}
			}

			var isOpen = getStatus(s);
			var statusClass = isOpen ? 'open' : 'closed';
			var statusText = isOpen ? 'Open' : 'Closed';
			var hours = formatTime(s.open) + ' – ' + formatTime(s.close);
			var delay = Math.min(i * 30, 300);

			html += '<a class="mp-card" href="' + s.link + '" style="animation-delay:' + delay + 'ms">' +
				'<img class="mp-card-photo" src="' + s.photo + '" alt="' + s.name + '" loading="lazy" />' +
				'<div class="mp-card-body">' +
					'<div class="mp-card-top">' +
						'<span class="mp-card-name">' + highlight(s.name) + '</span>' +
						'<span class="mp-card-tag ' + s.cat + '">' + (s.cat === 'fireworks' ? 'Fireworks' : s.cat === 'food' ? 'Food' : 'Crafts') + '</span>' +
					'</div>' +
					'<div class="mp-card-meta">Stand #' + s.num + ' · Zone ' + s.zone + ', Row ' + s.row + ' · ' + s.owner + '</div>' +
					'<div class="mp-card-bottom">' +
						'<span class="mp-card-status ' + statusClass + '">' +
							'<span class="mp-card-status-dot ' + statusClass + '"></span> ' + statusText +
						'</span>' +
						'<span class="mp-card-detail">' + hours + '</span>' +
					'</div>' +
				'</div>' +
				'<span class="mp-card-arrow">›</span>' +
			'</a>';
		});

		list.innerHTML = html;
	}

	// ═══ HIGHLIGHT SEARCH ═══
	function highlight(text) {
		if (!searchTerm) return text;
		var idx = text.toLowerCase().indexOf(searchTerm);
		if (idx === -1) return text;
		return text.substring(0, idx) +
			'<mark style="background:rgba(245,158,11,0.25);color:#fff;border-radius:2px;padding:0 1px;">' +
			text.substring(idx, idx + searchTerm.length) + '</mark>' +
			text.substring(idx + searchTerm.length);
	}
	</script>
</body>
</html>
